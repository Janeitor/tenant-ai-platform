services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tenant-ai-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tenant_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tenant_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tenant-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: tenant-ai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tenant-ai-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tenant_ai?schema=public
      S3_ENDPOINT: http://minio:9000
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: tenant-ai-admin-web
    environment:
      TENANT_AI_API_URL: http://api:3000/api
      PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      - api

  client-demo:
    build:
      context: .
      dockerfile: apps/client-demo/Dockerfile
    container_name: tenant-ai-client-demo
    environment:
      TENANT_AI_API_URL: http://api:3000/api
      TENANT_AI_API_KEY: ${TENANT_AI_API_KEY:-}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data: